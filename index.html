<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍄 皮克敏蘑菇討伐鬧鐘</title>
<meta name="theme-color" content="#ED1C24">
<style>
:root{
    --pikmin-green:#8DC63F;
    --pikmin-blue:#00AEEF;
    --pikmin-red:#ED1C24;
    --pikmin-yellow:#FFF200;
    --bg-color:#F7F9F4;
    --card-bg:#FFFFFF;
}
body{ 
    font-family:'Segoe UI',
    sans-serif; 
    background-color:
    var(--bg-color); 
    color:#333; 
    margin:0; 
    padding:20px; }


/* 三欄式佈局 */
.layout-wrapper {
    display: grid;
    grid-template-columns: 350px 1fr 450px;
    gap: 20px;
    max-width: 1200px;
    margin: 0 auto;
    align-items: flex-start;
}
@media (max-width: 1024px) {
    .layout-wrapper { grid-template-columns: 1fr; }
}

.log-panel, .container {
    background-color:var(--card-bg);
    padding:20px;
    border-radius:20px;
    box-shadow:0 8px 20px rgba(0,0,0,0.05);
}
.log-panel { border-top:8px solid var(--pikmin-yellow); height:80vh; display:flex; flex-direction:column; }
.container { border-top:8px solid var(--pikmin-red); }

h1,h2 { text-align:center; color:var(--pikmin-green); margin-top:0; }
#logContainer, #alarmsContainer { flex-grow:1; overflow-y:auto; gap:8px; display:flex; flex-direction:column; }

.form-group { margin-bottom:15px; }
input[type="text"], input[type="time"], input[type="number"] { width:100%; padding:10px; border:2px solid #E0E0E0; border-radius:8px; box-sizing:border-box; }
.quick-tags { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; }
.tag-btn { background: #f0f9ff; color: var(--pikmin-blue); border: 1px solid #bae6fd; padding: 5px; border-radius: 8px; cursor: pointer; font-size: 12px; }
.mode-tabs { display:flex; margin-bottom:15px; background:#eee; border-radius:8px; padding:4px; }
.mode-tabs label { flex:1; text-align:center; cursor:pointer; padding:8px 0; }
.mode-tabs input { display:none; }
.mode-tabs input:checked + span { background:white; color:var(--pikmin-blue); font-weight:bold; padding:8px 15px; border-radius:6px; }
button { width:100%; padding:12px; background-color:var(--pikmin-green); color:white; border:none; border-radius:8px; cursor:pointer; margin-top:5px; font-weight:bold; }

.alarm-item { background:#FDFDFD; border:1px solid #EEE; padding:3px; margin-bottom:1px; display:flex; justify-content:space-between; align-items:center; }

/* 各種類別的顏色設定 */
.alarm-exact { border-left: 8px solid var(--pikmin-blue); }
.alarm-delayed { border-left: 8px solid var(--pikmin-green); }
.alarm-ding1 { border-left: 8px solid var(--pikmin-yellow); background-color: #fdfaf4; }
.alarm-ding2 { border-left: 8px solid var(--pikmin-red); background-color: #fdf5f0; }

.delete-btn { background:#FF5252; width:auto; padding:5px 10px; font-size:12px; }
.input-section { display:none; }
.input-section.active { display:block; }
</style>
</head>

<body>

<div class="layout-wrapper">

    <div class="log-panel">
        <h2>📜 操作紀錄</h2>
        <div id="logContainer"></div>
        <button class="test-btn" style="background:#f0f0f0; color:#555;" onclick="clearLogsBtn()">🗑️ 清空畫面紀錄</button>
    </div>

    <div class="container">
        <h2>⏳ 已設定鬧鐘</h2>
        <div id="alarmsContainer"></div>
    </div>

    <div class="container">
        <h1>🍄 蘑菇討伐鬧鐘</h1>
        <div id="liveClock" style="text-align: center; font-size: 1.5em; font-weight: bold; color: #555; margin-bottom: 15px;">
        00:00:00
        </div>
        <div class="setting-group" style="margin-bottom: 5px; text-align: center;">
            <label class="switch">
                <input type="checkbox" id="notiToggle" checked>
                啟用 LINE 通知
            </label>
        </div>

        <div class="form-group">
            <label>📍 地點：</label>
            <input type="text" id="location" placeholder="例如：公園">
            <div class="quick-tags" id="quickTagsContainer"></div>
        </div>

        <div class="mode-tabs">
            <label><input type="radio" name="inputMode" value="exact" checked onchange="toggleInputMode()"><span>🕒 指定時間</span></label>
            <label><input type="radio" name="inputMode" value="remain" onchange="toggleInputMode()"><span>⏳ 剩餘時間</span></label>
        </div>

        <div id="mode-exact" class="input-section active">
            <div class="form-group"><label>預計摧毀時間：</label><input type="time" id="destroyTime"></div>
        </div>

        <div id="mode-remain" class="input-section">
            <div class="form-group"><label>倒數時間：</label>
                <div style="display:flex; gap:5px;">
                    <input type="number" id="remainH" placeholder="時"><input type="number" id="remainM" placeholder="分"><input type="number" id="remainS" placeholder="秒">
                </div>
            </div>
        </div>
        
        <button onclick="addAlarms()">🚀 設定鬧鐘</button>
        <button class="test-btn" onclick="testVoiceAndNotification()">🔊 測試通知</button>
        <button id="notifyBtn" class="notify-btn" onclick="requestNotificationPermission()">
            🔔 開啟桌面通知
        </button>
    </div>

</div>

<div id="customModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); justify-content:center; align-items:center;">
    <div class="container" style="max-width:300px;"><h3>⏰ 蘑菇提醒</h3><p id="modalMessage"></p><button onclick="closeModal()">我知道了</button></div>
</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
    getDatabase,
    ref,
    push,
    onChildAdded,
    onChildRemoved,
    remove
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* Firebase */

const firebaseConfig = {

    apiKey: "AIzaSyAUedm9C7uo1fLlMWULOTZU52X_om3c4Vw",
    authDomain: "pickminalarm.firebaseapp.com",
    databaseURL: "https://pickminalarm-default-rtdb.asia-southeast1.firebasedatabase.app/",
    projectId: "pickminalarm",
    storageBucket: "pickminalarm.firebasestorage.app",
    messagingSenderId: "886140078183",
    appId: "1:886140078183:web:617f1629a1f2689660ecc2"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const alarmsRef = ref(db, 'alarms');

const logsRef = ref(db, 'logs');


/* Apps Script */

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwxsOSF6kbxC6gd8sFhjVMYw1PVSYhKTTR9QFIkcKNtStacuuw1DS5rseDKjQ5nGYpfrg/exec";

const API_KEY = "MySecret12345";

/* State */

let activeAlarms = [];

let audioCtx = null;

/* Quick tags */

const quickLocations = [
    "聖公廟",
    "基督教長老教會",
    "三官大帝",
    "蓮潭",
    "三山宮",
    "禮拜堂",
    "乾天羅",
    "金爐",
    "元帝廟步道",
    "南天宮",
    "大蓮莊",
    "孔子廟",
    "進擊的紅貓",
    "少數民族",
    "菱形噴水池",
    "泰山石敢當",
    "南門意象",
    "船錨",
    "和服小白",
    "酸菜白肉鍋",
    "西門遺址",
    "美術海"
];

/* Window binding */

window.requestNotificationPermission = requestNotificationPermission;
window.clearLogsBtn = clearLogsBtn;
window.toggleInputMode = toggleInputMode;
window.testVoiceAndNotification = testVoiceAndNotification;
window.addAlarms = addAlarms;
window.removeAlarm = removeAlarm;
window.closeModal = closeModal;

/* Firebase listeners */

onChildAdded(alarmsRef, (snapshot) => {

    const data = snapshot.val();

    setupLocalAlarm(
        snapshot.key,
        data.location,
        data.timestamp,
        data.type
    );

});

onChildRemoved(alarmsRef, (snapshot) => {

    const id = snapshot.key;

    const alarmIndex = activeAlarms.findIndex(a => a.id === id);

    if (alarmIndex > -1) {

        clearTimeout(activeAlarms[alarmIndex].timeoutId);

        activeAlarms.splice(alarmIndex, 1);

        renderAlarms();
    }

});

onChildAdded(logsRef, (snapshot) => {

    const data = snapshot.val();

    renderLogToScreen(
        data.message,
        data.type,
        data.timeStr
    );

});

const notiToggle = document.getElementById('notiToggle');
if (notiToggle) {
    notiToggle.addEventListener('change', function() {
        const isEnabled = this.checked;
        firebase.database().ref('settings/notificationEnabled').set(isEnabled);
    });
}
/* Notification */

function requestNotificationPermission(){

    if(!("Notification" in window)) return;

    Notification.requestPermission().then(permission => {

        if(permission === "granted"){

            checkNotificationStatus();

            new Notification("🍄 通知已啟用");

        }

    });

}

function checkNotificationStatus(){

    const btn = document.getElementById('notifyBtn');

    if(Notification.permission === "granted"){

        btn.innerText = "✅ 已啟用桌面通知";

        btn.classList.add("granted");

        btn.disabled = true;

    }

}

function sendDesktopNotification(title,message){

    if(Notification.permission === "granted"){

        new Notification(title,{
            body:message,
            icon:"icon.png"
        });

    }

}

/* LINE */

async function triggerLineNotification(location, type, destroyTime = '') {
    try {
        await fetch("https://script.google.com/macros/s/AKfycbwxsOSF6kbxC6gd8sFhjVMYw1PVSYhKTTR9QFIkcKNtStacuuw1DS5rseDKjQ5nGYpfrg/exec", {
            method: 'POST',
            mode: 'no-cors', // 關鍵：加上這一行，繞過 CORS 預檢
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                apiKey: "MySecret12345", 
                action: "sendNotification", 
                location, 
                type, 
                destroyTime 
            })
        });
        console.log("LINE 通知請求已發出 (Fire and forget)");
    } catch (e) { 
        console.error("LINE 通知發生錯誤:", e); 
    }
}

/* Quick tag */

function initQuickTags(){

    const container = document.getElementById('quickTagsContainer');

    quickLocations.forEach(loc => {

        const btn = document.createElement('button');

        btn.className = 'tag-btn';

        btn.type = 'button';

        btn.textContent = loc;

        btn.onclick = () => {
            document.getElementById('location').value = loc;
        };

        container.appendChild(btn);

    });

}

/* Audio */

function initAudio(){

    if(!audioCtx){

        audioCtx = new(window.AudioContext || window.webkitAudioContext)();

    }

}

function playTone(freq,start,duration){

    initAudio();

    const osc = audioCtx.createOscillator();

    const gain = audioCtx.createGain();

    osc.frequency.value = freq;

    // --- 在這裡調整音量 ---
    // 數值範圍是 0 到 1，0.2 代表 20% 的音量，聽起來會溫和很多
    gain.gain.value = 0.5; 
    // --------------------
    
    osc.connect(gain);

    gain.connect(audioCtx.destination);

    osc.start(audioCtx.currentTime + start);

    osc.stop(audioCtx.currentTime + start + duration);

}

function playSingleDing(){

    playTone(700,0,0.5);

}

function playTripleDing(){

    playTone(700,0,0.15);

    playTone(700,0.2,0.15);

    playTone(700,0.4,0.15);

}

/* Alarm add */

function addAlarms(){

    initAudio();

    const location = document.getElementById('location').value.trim();

    if(!location){

        showModal("請輸入地點");

        return;

    }

    const mode = document.querySelector('input[name="inputMode"]:checked').value;

    let targetTime = 0;

    const now = new Date();

    if(mode === 'exact'){

        const timeInput = document.getElementById('destroyTime').value;

        if(!timeInput){

            showModal("請輸入時間");

            return;

        }

        const [h,m] = timeInput.split(':').map(Number);

        const date = new Date();

        date.setHours(h,m,0,0);

        if(date <= now){

            date.setDate(date.getDate() + 1);

        }

        targetTime = date.getTime();

    }else{

        const h = parseInt(document.getElementById('remainH').value)||0;
        const m = parseInt(document.getElementById('remainM').value)||0;
        const s = parseInt(document.getElementById('remainS').value)||0;

        targetTime = now.getTime() + (h*3600000) + (m*60000) + (s*1000);

    }

    const plus4m = targetTime + 240000;
    const plus4m30 = targetTime + 270000;
    const plus4m50 = targetTime + 290000;

    push(alarmsRef,{
        location,
        timestamp:targetTime,
        type:"exact"
    });

    push(alarmsRef,{
        location,
        timestamp:plus4m,
        type:"delayed"
    });

    push(alarmsRef,{
        location,
        timestamp:plus4m30,
        type:"ding1"
    });

    push(alarmsRef,{
        location,
        timestamp:plus4m50,
        type:"ding2"
    });

    const destroyTimeStr = new Date(targetTime).toLocaleTimeString('zh-TW');

    triggerLineNotification(location,"confirmed",destroyTimeStr);

    pushLogToCloud(`建立 ${location} 鬧鐘`,'create');

    // --- 這裡加上語音反饋 ---
    playAlertSound(`已為 ${location} 設定鬧鐘`);
    
    document.getElementById('location').value='';
    document.getElementById('remainH').value = '';
    document.getElementById('remainM').value = '';
    document.getElementById('remainS').value = '';
}

/* Setup */

function setupLocalAlarm(id,location,timestamp,type){

    if(activeAlarms.some(a => a.id === id)){

        return;

    }

    const delay = timestamp - Date.now();

    if(delay < 0) return;

    if(delay > 86400000) return;

    const timeoutId = setTimeout(() => {

        triggerAlarm(location,type,id,timestamp);

    },delay);

    activeAlarms.push({
        id,
        location,
        timestamp,
        type,
        timeoutId
    });

    activeAlarms.sort((a,b) => a.timestamp - b.timestamp);

    renderAlarms();

}

/* Trigger */

function triggerAlarm(location,type,id,timestamp){
// 1. 本地防重複：如果這台裝置已經響過這個鬧鐘，就不要重複響
    if (!window.triggeredAlarmsSet) {
        window.triggeredAlarmsSet = new Set();
    }
    if (window.triggeredAlarmsSet.has(id)) {
        return;
    }
    window.triggeredAlarmsSet.add(id);
    
    if(Date.now() < timestamp - 3000){
        return;
    }

    let message = "";
    if(type === "exact"){
        message = `【${location}】已摧毀！`;
        playAlertSound(message);
        showModal(message);
        sendDesktopNotification("🍄 已摧毀",message);
        triggerLineNotification(location,"destroyed");
        pushLogToCloud(message,'trigger');
    }

    else if(type === "delayed"){
        message = `${location} 1分鐘`;
        playAlertSound(message);
        showModal(message);
        sendDesktopNotification("⚠️ 1分鐘",message);
        triggerLineNotification(location,"warning");
        pushLogToCloud(message,'trigger');
    }

    else if(type === "ding1"){
        playSingleDing();
        pushLogToCloud(`${location} 倒數30秒`,'ding');
    }

    else if(type === "ding2"){
        playTripleDing();
        pushLogToCloud(`${location} 倒數10秒`,'ding');
    }
    
    // 觸發後延遲 5分鐘 自動清理 Firebase 資料
    setTimeout(() => {
        const alarmRef = ref(db, 'alarms/' + id);
        remove(alarmRef).catch(e => console.error("自動清理失敗: ", e));
    }, 300000);
    
    activeAlarms = activeAlarms.filter(a => a.id !== id);
    renderAlarms();
}

/* Render */

function renderAlarms(){
    const container = document.getElementById('alarmsContainer');
    container.innerHTML='';

    activeAlarms.forEach(alarm => {
        const div = document.createElement('div');
        
        // 根據 type 加入不同的 class
        div.className = `alarm-item alarm-${alarm.type}`; 

        div.innerHTML = `
            <div>
                <strong>${alarm.location}</strong>
                <span style="font-size: 12px; margin-left: 8px;">
                    ${alarm.type === 'exact' ? '✅ 摧毀' : 
                      alarm.type === 'delayed' ? '⚠️ 倒數1分鐘' : 
                      alarm.type === 'ding1' ? '🔔 倒數30秒' : 
                      alarm.type === 'ding2' ? '🔔 倒數10秒' : ''}
                </span>
                <div style="font-size: 15px; color: #888;">
                    ${new Date(alarm.timestamp).toLocaleTimeString('zh-TW')}</div>
          
                </div>
            </div>
            <button class="delete-btn" onclick="removeAlarm('${alarm.id}')">刪除</button>
        `;
        container.appendChild(div);
    });
}

/* Log */

function pushLogToCloud(message,type){

    push(logsRef,{
        message,
        type,
        timeStr:new Date().toLocaleTimeString('zh-TW')
    });

}

function renderLogToScreen(message,type,timeStr){

    const container = document.getElementById('logContainer');

    const logItem = document.createElement('div');

    logItem.className = `log-item log-${type}`;

    const timeSpan = document.createElement('span');

    timeSpan.className = 'log-time';

    timeSpan.textContent = timeStr;

    const msgSpan = document.createElement('span');

    msgSpan.textContent = message;

    logItem.appendChild(timeSpan);

    logItem.appendChild(msgSpan);

    container.prepend(logItem);

}

function clearLogsBtn(){
    if(confirm("確定要刪除雲端的所有操作紀錄嗎？")) {
        const logsRef = ref(db, 'logs');
        remove(logsRef) // 這行會刪除 Firebase 上整個 logs 節點的資料
            .then(() => {
                document.getElementById('logContainer').innerHTML='';
                console.log("雲端紀錄已清除");
            })
            .catch(error => {
                console.error("刪除失敗: ", error);
            });
    }
}

/* Misc */

function removeAlarm(id){

    remove(ref(db,'alarms/' + id));

}

function toggleInputMode(){

    const mode = document.querySelector('input[name="inputMode"]:checked').value;

    document.getElementById('mode-exact').classList.remove('active');

    document.getElementById('mode-remain').classList.remove('active');

    document.getElementById(`mode-${mode}`).classList.add('active');

}

function playAlertSound(text){

    if('speechSynthesis' in window){

        window.speechSynthesis.cancel();

        const utterance = new SpeechSynthesisUtterance(text);

        utterance.lang='zh-TW';

        speechSynthesis.speak(utterance);

    }

}

function testVoiceAndNotification(){

    playAlertSound("測試成功");

    sendDesktopNotification("🍄 測試通知","通知正常");

    playSingleDing();

}

function showModal(msg){

    document.getElementById('modalMessage').textContent = msg;

    document.getElementById('customModal').style.display='flex';

}

function closeModal(){

    document.getElementById('customModal').style.display='none';

}

function setNowTime(){

    const now = new Date();

    document.getElementById('destroyTime').value =
        `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

}

/* SW */

if('serviceWorker' in navigator){

    window.addEventListener('load', () => {


    });

}

/* Init */

initQuickTags();

setNowTime();

checkNotificationStatus();
    
/* Live Clock */
setInterval(() => document.getElementById('liveClock').textContent = new Date().toLocaleTimeString('zh-TW', {hour12: false}), 1000);

</script>

</body>
</html>

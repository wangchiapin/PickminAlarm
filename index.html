<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🍄 皮克敏蘑菇討伐鬧鐘</title>

<meta name="theme-color" content="#ED1C24">

<style>

:root{
    --pikmin-green:#8DC63F;
    --pikmin-blue:#00AEEF;
    --pikmin-red:#ED1C24;
    --pikmin-yellow:#FFF200;
    --bg-color:#F7F9F4;
    --card-bg:#FFFFFF;
}

body{
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
    background-color:var(--bg-color);
    color:#333;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    min-height:100vh;
    margin:0;
    padding:20px;
    box-sizing:border-box;
}

.layout-wrapper{
    display:flex;
    flex-direction:row;
    gap:20px;
    width:100%;
    max-width:900px;
    justify-content:center;
    align-items:flex-start;
}

.log-panel{
    background-color:var(--card-bg);
    padding:20px;
    border-radius:20px;
    box-shadow:0 8px 20px rgba(0,0,0,0.05);
    width:100%;
    max-width:320px;
    border-top:8px solid var(--pikmin-yellow);
    height:calc(100vh - 80px);
    position:sticky;
    top:20px;
    display:flex;
    flex-direction:column;
}

.container{
    background-color:var(--card-bg);
    padding:30px;
    border-radius:20px;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
    width:100%;
    max-width:400px;
    border-top:8px solid var(--pikmin-red);
}

@media (max-width:768px){
    .layout-wrapper{
        flex-direction:column;
        align-items:center;
    }

    .log-panel{
        order:2;
        height:400px;
        position:static;
        max-width:400px;
    }

    .container{
        order:1;
    }
}

h1,h2{
    text-align:center;
    color:var(--pikmin-green);
    margin-top:0;
    margin-bottom:20px;
}

.log-panel h2{
    font-size:20px;
    color:#f5b041;
    border-bottom:2px solid #EEE;
    padding-bottom:10px;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
    color:#555;
}

input[type="text"],
input[type="time"],
input[type="number"]{
    width:100%;
    padding:10px;
    border:2px solid #E0E0E0;
    border-radius:8px;
    font-size:16px;
    box-sizing:border-box;
}

input:focus{
    border-color:var(--pikmin-blue);
    outline:none;
}

.quick-tags{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:10px;
}

.tag-btn{
    background:#f0f9ff;
    color:var(--pikmin-blue);
    border:1px solid #bae6fd;
    padding:6px 12px;
    border-radius:15px;
    cursor:pointer;
    font-size:13px;
}

.tag-btn:hover{
    background:var(--pikmin-blue);
    color:white;
}

.mode-tabs{
    display:flex;
    margin-bottom:15px;
    background:#eee;
    border-radius:8px;
    padding:4px;
}

.mode-tabs label{
    flex:1;
    text-align:center;
    margin:0;
    cursor:pointer;
}

.mode-tabs input{
    display:none;
}

.mode-tabs span{
    display:block;
    padding:8px 0;
    border-radius:6px;
}

.mode-tabs input:checked + span{
    background:white;
    color:var(--pikmin-blue);
    font-weight:bold;
}

.countdown-group{
    display:flex;
    gap:10px;
}

.countdown-group input{
    text-align:center;
}

.input-section{
    display:none;
}

.input-section.active{
    display:block;
}

button{
    width:100%;
    padding:12px;
    background-color:var(--pikmin-green);
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    margin-top:5px;
}

button:hover{
    opacity:0.9;
}

.notify-btn{
    background:var(--pikmin-blue);
    font-size:16px;
    margin-bottom:15px;
}

.notify-btn.granted{
    background:#ccc;
    cursor:not-allowed;
}

.test-btn{
    background:#f0f0f0;
    color:#555;
    font-size:14px;
    border:1px solid #ccc;
}

.alarm-list{
    margin-top:30px;
}

.alarm-item{
    background:#FDFDFD;
    border:1px solid #EEE;
    border-left:5px solid var(--pikmin-blue);
    padding:10px 15px;
    border-radius:6px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:14px;
}

.alarm-item.delayed{
    border-left-color:var(--pikmin-yellow);
}

.alarm-item.ding1{
    border-left-color:#f5b041;
}

.alarm-item.ding2{
    border-left-color:#e67e22;
}

.delete-btn{
    background:#FF5252;
    width:auto;
    padding:5px 10px;
    font-size:12px;
}

#logContainer{
    flex-grow:1;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:8px;
}

.log-item{
    font-size:13px;
    padding:8px;
    border-radius:6px;
    background:#f9f9f9;
    border-left:4px solid #ccc;
}

.log-time{
    color:#888;
    font-size:11px;
    display:block;
    margin-bottom:2px;
}

.log-create{ border-left-color:var(--pikmin-blue); }
.log-trigger{ border-left-color:var(--pikmin-red); }
.log-ding{ border-left-color:#e67e22; }
.log-delete{ border-left-color:#999; }

#customModal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
    z-index:1000;
}

.modal-content{
    background:white;
    padding:30px;
    border-radius:15px;
    text-align:center;
    max-width:300px;
    border-top:8px solid var(--pikmin-red);
}

</style>
</head>

<body>

<div class="layout-wrapper">

<div class="log-panel">

<h2>📜 操作紀錄</h2>

<div id="logContainer">
<div class="log-item">雲端連線中...</div>
</div>

<button class="test-btn" onclick="clearLogsBtn()">🗑️ 清空畫面紀錄</button>

</div>

<div class="container">

<h1>🍄 蘑菇討伐鬧鐘</h1>

<button id="notifyBtn" class="notify-btn" onclick="requestNotificationPermission()">
🔔 開啟桌面通知
</button>

<div class="form-group">

<label>📍 地點：</label>

<input type="text" id="location" placeholder="例如：公園">

<div class="quick-tags" id="quickTagsContainer"></div>

</div>

<div class="mode-tabs">

<label>
<input type="radio" name="inputMode" value="exact" checked onchange="toggleInputMode()">
<span>🕒 指定時間</span>
</label>

<label>
<input type="radio" name="inputMode" value="remain" onchange="toggleInputMode()">
<span>⏳ 剩餘時間</span>
</label>

</div>

<div id="mode-exact" class="input-section active">

<div class="form-group">
<label>預計摧毀時間：</label>
<input type="time" id="destroyTime">
</div>

</div>

<div id="mode-remain" class="input-section">

<div class="form-group">

<label>倒數時間：</label>

<div class="countdown-group">
<input type="number" id="remainH" placeholder="時">
<input type="number" id="remainM" placeholder="分">
<input type="number" id="remainS" placeholder="秒">
</div>

</div>

</div>

<button onclick="addAlarms()">🚀 設定鬧鐘</button>

<button class="test-btn" onclick="testVoiceAndNotification()">
🔊 測試通知
</button>

<div class="alarm-list">

<h2>⏳ 雲端同步中的提醒</h2>

<div id="alarmsContainer"></div>

</div>

</div>

</div>

<div id="customModal">

<div class="modal-content">

<h3>⏰ 蘑菇提醒</h3>

<p id="modalMessage"></p>

<button onclick="closeModal()">我知道了</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
    getDatabase,
    ref,
    push,
    onChildAdded,
    onChildRemoved,
    remove
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* Firebase */

const firebaseConfig = {

    apiKey: "AIzaSyAUedm9C7uo1fLlMWULOTZU52X_om3c4Vw",
    authDomain: "pickminalarm.firebaseapp.com",
    databaseURL: "https://pickminalarm-default-rtdb.asia-southeast1.firebasedatabase.app/",
    projectId: "pickminalarm",
    storageBucket: "pickminalarm.firebasestorage.app",
    messagingSenderId: "886140078183",
    appId: "1:886140078183:web:617f1629a1f2689660ecc2"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const alarmsRef = ref(db, 'alarms');

const logsRef = ref(db, 'logs');

/* Apps Script */

const WEB_APP_URL = "https://script.google.com/macros/library/d/1vTr6Kw-JNysfcqtS8NN2osQfl8y8NzvVuGjyYZIIkr1f3hRBBYXbwaE4/1";

const API_KEY = "MySecret12345";

/* State */

let activeAlarms = [];

let audioCtx = null;

/* Quick tags */

const quickLocations = [
    "聖宮廟",
    "長老教會",
    "三官大帝",
    "蓮潭",
    "孔子廟"
];

/* Window binding */

window.requestNotificationPermission = requestNotificationPermission;
window.clearLogsBtn = clearLogsBtn;
window.toggleInputMode = toggleInputMode;
window.testVoiceAndNotification = testVoiceAndNotification;
window.addAlarms = addAlarms;
window.removeAlarm = removeAlarm;
window.closeModal = closeModal;

/* Firebase listeners */

onChildAdded(alarmsRef, (snapshot) => {

    const data = snapshot.val();

    setupLocalAlarm(
        snapshot.key,
        data.location,
        data.timestamp,
        data.type
    );

});

onChildRemoved(alarmsRef, (snapshot) => {

    const id = snapshot.key;

    const alarmIndex = activeAlarms.findIndex(a => a.id === id);

    if (alarmIndex > -1) {

        clearTimeout(activeAlarms[alarmIndex].timeoutId);

        activeAlarms.splice(alarmIndex, 1);

        renderAlarms();
    }

});

onChildAdded(logsRef, (snapshot) => {

    const data = snapshot.val();

    renderLogToScreen(
        data.message,
        data.type,
        data.timeStr
    );

});

/* Notification */

function requestNotificationPermission(){

    if(!("Notification" in window)) return;

    Notification.requestPermission().then(permission => {

        if(permission === "granted"){

            checkNotificationStatus();

            new Notification("🍄 通知已啟用");

        }

    });

}

function checkNotificationStatus(){

    const btn = document.getElementById('notifyBtn');

    if(Notification.permission === "granted"){

        btn.innerText = "✅ 已啟用桌面通知";

        btn.classList.add("granted");

        btn.disabled = true;

    }

}

function sendDesktopNotification(title,message){

    if(Notification.permission === "granted"){

        new Notification(title,{
            body:message,
            icon:"icon.png"
        });

    }

}

/* LINE */

function triggerLineNotification(location,type,destroyTime=''){

    fetch(https://script.google.com/macros/s/AKfycbwxsOSF6kbxC6gd8sFhjVMYw1PVSYhKTTR9QFIkcKNtStacuuw1DS5rseDKjQ5nGYpfrg/exec, {

        method:'POST',

        headers:{
            'Content-Type':'application/json'
        },

        keepalive:true,

        body:JSON.stringify({
            apiKey:API_KEY,
            action:"sendNotification",
            location,
            type,
            destroyTime
        })

    })
    .then(res => res.text())
    .then(data => console.log(data))
    .catch(err => console.error(err));

}

/* Quick tag */

function initQuickTags(){

    const container = document.getElementById('quickTagsContainer');

    quickLocations.forEach(loc => {

        const btn = document.createElement('button');

        btn.className = 'tag-btn';

        btn.type = 'button';

        btn.textContent = loc;

        btn.onclick = () => {
            document.getElementById('location').value = loc;
        };

        container.appendChild(btn);

    });

}

/* Audio */

function initAudio(){

    if(!audioCtx){

        audioCtx = new(window.AudioContext || window.webkitAudioContext)();

    }

}

function playTone(freq,start,duration){

    initAudio();

    const osc = audioCtx.createOscillator();

    const gain = audioCtx.createGain();

    osc.frequency.value = freq;

    osc.connect(gain);

    gain.connect(audioCtx.destination);

    osc.start(audioCtx.currentTime + start);

    osc.stop(audioCtx.currentTime + start + duration);

}

function playSingleDing(){

    playTone(880,0,0.5);

}

function playTripleDing(){

    playTone(1046,0,0.15);

    playTone(1046,0.2,0.15);

    playTone(1046,0.4,0.15);

}

/* Alarm add */

function addAlarms(){

    initAudio();

    const location = document.getElementById('location').value.trim();

    if(!location){

        showModal("請輸入地點");

        return;

    }

    const mode = document.querySelector('input[name="inputMode"]:checked').value;

    let targetTime = 0;

    const now = new Date();

    if(mode === 'exact'){

        const timeInput = document.getElementById('destroyTime').value;

        if(!timeInput){

            showModal("請輸入時間");

            return;

        }

        const [h,m] = timeInput.split(':').map(Number);

        const date = new Date();

        date.setHours(h,m,0,0);

        if(date <= now){

            date.setDate(date.getDate() + 1);

        }

        targetTime = date.getTime();

    }else{

        const h = parseInt(document.getElementById('remainH').value)||0;
        const m = parseInt(document.getElementById('remainM').value)||0;
        const s = parseInt(document.getElementById('remainS').value)||0;

        targetTime = now.getTime() + (h*3600000) + (m*60000) + (s*1000);

    }

    const plus4m = targetTime + 240000;
    const plus4m30 = targetTime + 270000;
    const plus4m50 = targetTime + 290000;

    push(alarmsRef,{
        location,
        timestamp:targetTime,
        type:"exact"
    });

    push(alarmsRef,{
        location,
        timestamp:plus4m,
        type:"delayed"
    });

    push(alarmsRef,{
        location,
        timestamp:plus4m30,
        type:"ding1"
    });

    push(alarmsRef,{
        location,
        timestamp:plus4m50,
        type:"ding2"
    });

    const destroyTimeStr = new Date(targetTime).toLocaleTimeString('zh-TW');

    triggerLineNotification(location,"confirmed",destroyTimeStr);

    pushLogToCloud(`建立 ${location} 鬧鐘`,'create');

    document.getElementById('location').value='';

}

/* Setup */

function setupLocalAlarm(id,location,timestamp,type){

    if(activeAlarms.some(a => a.id === id)){

        return;

    }

    const delay = timestamp - Date.now();

    if(delay < 0) return;

    if(delay > 86400000) return;

    const timeoutId = setTimeout(() => {

        triggerAlarm(location,type,id,timestamp);

    },delay);

    activeAlarms.push({
        id,
        location,
        timestamp,
        type,
        timeoutId
    });

    activeAlarms.sort((a,b) => a.timestamp - b.timestamp);

    renderAlarms();

}

/* Trigger */

function triggerAlarm(location,type,id,timestamp){

    if(Date.now() < timestamp - 3000){

        return;

    }

    let message = "";

    if(type === "exact"){

        message = `【${location}】已摧毀！`;

        playAlertSound(message);

        showModal(message);

        sendDesktopNotification("🍄 已摧毀",message);

        triggerLineNotification(location,"destroyed");

        pushLogToCloud(message,'trigger');

    }

    else if(type === "delayed"){

        message = `${location} 1分鐘`;

        playAlertSound(message);

        showModal(message);

        sendDesktopNotification("⚠️ 1分鐘",message);

        triggerLineNotification(location,"warning");

        pushLogToCloud(message,'trigger');

    }

    else if(type === "ding1"){

        playSingleDing();

        pushLogToCloud(`${location} 倒數30秒`,'ding');

    }

    else if(type === "ding2"){

        playTripleDing();

        pushLogToCloud(`${location} 倒數10秒`,'ding');

    }

    remove(ref(db,'alarms/' + id));

    activeAlarms = activeAlarms.filter(a => a.id !== id);

    renderAlarms();

}

/* Render */

function renderAlarms(){

    const container = document.getElementById('alarmsContainer');

    container.innerHTML='';

    if(activeAlarms.length === 0){

        container.innerHTML = '<p>目前沒有鬧鐘</p>';

        return;

    }

    activeAlarms.forEach(alarm => {

        const div = document.createElement('div');

        div.className = 'alarm-item';

        div.innerHTML = `
            <div>
                <strong>${alarm.location}</strong>
                <div>${new Date(alarm.timestamp).toLocaleTimeString('zh-TW')}</div>
            </div>

            <button class="delete-btn" onclick="removeAlarm('${alarm.id}')">
                刪除
            </button>
        `;

        container.appendChild(div);

    });

}

/* Log */

function pushLogToCloud(message,type){

    push(logsRef,{
        message,
        type,
        timeStr:new Date().toLocaleTimeString('zh-TW')
    });

}

function renderLogToScreen(message,type,timeStr){

    const container = document.getElementById('logContainer');

    const logItem = document.createElement('div');

    logItem.className = `log-item log-${type}`;

    const timeSpan = document.createElement('span');

    timeSpan.className = 'log-time';

    timeSpan.textContent = timeStr;

    const msgSpan = document.createElement('span');

    msgSpan.textContent = message;

    logItem.appendChild(timeSpan);

    logItem.appendChild(msgSpan);

    container.prepend(logItem);

}

function clearLogsBtn(){

    document.getElementById('logContainer').innerHTML='';

}

/* Misc */

function removeAlarm(id){

    remove(ref(db,'alarms/' + id));

}

function toggleInputMode(){

    const mode = document.querySelector('input[name="inputMode"]:checked').value;

    document.getElementById('mode-exact').classList.remove('active');

    document.getElementById('mode-remain').classList.remove('active');

    document.getElementById(`mode-${mode}`).classList.add('active');

}

function playAlertSound(text){

    if('speechSynthesis' in window){

        window.speechSynthesis.cancel();

        const utterance = new SpeechSynthesisUtterance(text);

        utterance.lang='zh-TW';

        speechSynthesis.speak(utterance);

    }

}

function testVoiceAndNotification(){

    playAlertSound("測試成功");

    sendDesktopNotification("🍄 測試通知","通知正常");

    playSingleDing();

}

function showModal(msg){

    document.getElementById('modalMessage').textContent = msg;

    document.getElementById('customModal').style.display='flex';

}

function closeModal(){

    document.getElementById('customModal').style.display='none';

}

function setNowTime(){

    const now = new Date();

    document.getElementById('destroyTime').value =
        `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

}

/* SW */

if('serviceWorker' in navigator){

    window.addEventListener('load', () => {


    });

}

/* Init */

initQuickTags();

setNowTime();

checkNotificationStatus();

</script>

</body>
</html>

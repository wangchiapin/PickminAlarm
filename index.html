<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍄 皮克敏蘑菇討伐鬧鐘 (即時通知優化版)</title>
    <style>
        :root { --pikmin-green: #8DC63F; --pikmin-blue: #00AEEF; --pikmin-red: #ED1C24; --pikmin-yellow: #FFF200; --bg-color: #F7F9F4; --card-bg: #FFFFFF; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; }
        .layout-wrapper { display: flex; flex-direction: row; gap: 20px; width: 100%; max-width: 900px; justify-content: center; }
        .log-panel { background-color: var(--card-bg); padding: 20px; border-radius: 20px; width: 320px; height: 80vh; overflow-y: auto; }
        .container { background-color: var(--card-bg); padding: 30px; border-radius: 20px; width: 400px; }
        button { width: 100%; padding: 12px; background-color: var(--pikmin-green); color: white; border: none; border-radius: 8px; cursor: pointer; }
        .alarm-item { margin-bottom: 10px; padding: 10px; border-left: 5px solid #ccc; background: #fdfdfd; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <div class="layout-wrapper">
        <div class="log-panel">
            <h2>📜 操作紀錄</h2>
            <div id="logContainer"><div class="log-item">雲端連線中...</div></div>
        </div>
        <div class="container">
            <h1>🍄 蘑菇討伐鬧鐘</h1>
            <input type="text" id="location" placeholder="地點">
            <input type="time" id="destroyTime">
            <button onclick="addAlarms()">🚀 設定鬧鐘</button>
            <div id="alarmsContainer"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, onChildRemoved, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAUedm9C7uo1fLlMWULOTZU52X_om3c4Vw",
            databaseURL: "https://pickminalarm-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "pickminalarm"
        };

        const db = getDatabase(initializeApp(firebaseConfig));
        const alarmsRef = ref(db, 'alarms');
        const logsRef = ref(db, 'logs');
        let activeAlarms = [];

        window.addAlarms = addAlarms;
        window.removeAlarm = removeAlarm;

        // 核心修正：將觸發邏輯改寫，確保只刪除自己，不刪別人的
        function triggerAlarm(location, type, id) {
            const currentTimeStr = new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
            
            if (type === "exact") {
                triggerLineNotification(location, "destroyed", currentTimeStr);
                alert(`【${location}】已摧毀！`);
            } else if (type === "delayed") {
                triggerLineNotification(location, "warning", currentTimeStr);
            }

            // 修正點：確定 id 是正確的單筆 ID，只刪除觸發的那一筆資料
            console.log(`觸發事件: ${type}, 正在移除 ID: ${id}`);
            remove(ref(db, 'alarms/' + id));
        }

        async function triggerLineNotification(location, type, destroyTime) {
            try {
                await fetch('https://script.google.com/macros/s/AKfycbwxsOSF6kbxC6gd8sFhjVMYw1PVSYhKTTR9QFIkcKNtStacuuw1DS5rseDKjQ5nGYpfrg/exec', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        apiKey: "MySecret12345",
                        location: location,
                        type: type,
                        destroyTime: destroyTime
                    })
                });
            } catch (e) { console.error("LINE 通知失敗:", e); }
        }

        function addAlarms() {
            const locInput = document.getElementById('location').value.trim();
            const timeInput = document.getElementById('destroyTime').value;
            if (!locInput || !timeInput) return alert("請填寫完整");

            const [hours, minutes] = timeInput.split(':').map(Number);
            let destroyDate = new Date();
            destroyDate.setHours(hours, minutes, 0, 0);
            const timeExact = destroyDate.getTime();

            // 設定四個不同階段的資料 (每個 push 產生一個獨立 ID)
            push(alarmsRef, { location: locInput, timestamp: timeExact, type: "exact" });
            push(alarmsRef, { location: locInput, timestamp: timeExact + 240000, type: "delayed" });
            push(alarmsRef, { location: locInput, timestamp: timeExact + 270000, type: "ding1" });
            push(alarmsRef, { location: locInput, timestamp: timeExact + 290000, type: "ding2" });

            triggerLineNotification(locInput, "confirmed", timeInput);
            alert("鬧鐘已設定！");
        }

        // 其他基礎函式 (setupLocalAlarm, renderAlarms...) 請維持你原本的樣子即可
        // 確保 setupLocalAlarm 傳入的 id 是 push 產生的那個唯一 ID
        onChildAdded(alarmsRef, (snapshot) => {
            const id = snapshot.key;
            const data = snapshot.val();
            const delay = data.timestamp - Date.now();
            if (delay > 0) {
                const timeoutId = setTimeout(() => triggerAlarm(data.location, data.type, id), delay);
                activeAlarms.push({ id, ...data, timeoutId });
            }
        });
    </script>
</body>
</html>
